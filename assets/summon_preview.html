<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summon Cutscene Animation Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #02040a;
      color: #fff;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Controls Panel */
    #controls {
      position: absolute;
      bottom: 40px;
      z-index: 30;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(11, 15, 27, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 24px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      max-width: 90%;
      justify-content: center;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Rarity specific buttons */
    .btn-3star { border-color: rgba(6, 182, 212, 0.4); color: #22d3ee; }
    .btn-3star:hover { background: rgba(6, 182, 212, 0.15); box-shadow: 0 0 15px rgba(6, 182, 212, 0.25); }

    .btn-4star { border-color: rgba(168, 85, 247, 0.4); color: #c084fc; }
    .btn-4star:hover { background: rgba(168, 85, 247, 0.15); box-shadow: 0 0 15px rgba(168, 85, 247, 0.25); }

    .btn-5star { border-color: rgba(245, 158, 11, 0.4); color: #fbbf24; }
    .btn-5star:hover { background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 15px rgba(245, 158, 11, 0.25); }

    /* Glassmorphic Skip button */
    #skip-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 40;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.15s ease;
      display: none;
    }

    #skip-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.03);
    }

    #skip-btn:active {
      transform: scale(0.97);
    }

    #status-msg {
      position: absolute;
      top: 40px;
      z-index: 25;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #showcase-box {
      position: absolute;
      inset: 0;
      z-index: 15;
      background: rgba(2, 3, 8, 0.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #showcase-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      max-width: 900px;
      justify-content: center;
      padding: 20px;
    }

    .showcase-card {
      width: 120px;
      height: 180px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: popCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.6) translateY(20px);
    }

    @keyframes popCard {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-5 { border-color: rgba(245, 158, 11, 0.45); background: rgba(245, 158, 11, 0.08); box-shadow: 0 0 25px rgba(245, 158, 11, 0.15); }
    .card-4 { border-color: rgba(168, 85, 247, 0.45); background: rgba(168, 85, 247, 0.08); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }

    .card-rarity {
      color: #fbbf24;
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="container">
    <div id="status-msg">Cosmic Singularity Stabilized</div>
    <button id="skip-btn">Skip Sequence</button>

    <!-- Transparent Drawing Layer -->
    <canvas id="canvas"></canvas>

    <!-- Showcase Container -->
    <div id="showcase-box">
      <h2 style="font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin: 0; text-align: center;">Summon stabilized</h2>
      <div id="showcase-grid"></div>
      <button id="close-showcase" style="border-color: rgba(255, 255, 255, 0.25); margin-top: 15px;">Close Results</button>
    </div>

    <!-- Interface Panel -->
    <div id="controls">
      <button class="btn-3star" onclick="startSummon([3])">Single Pull (3★)</button>
      <button class="btn-4star" onclick="startSummon([4])">Single Pull (4★)</button>
      <button class="btn-5star" onclick="startSummon([5])">Single Pull (5★)</button>
      <div style="width: 1px; background: rgba(255, 255, 255, 0.1); margin: 0 4px;"></div>
      <button class="btn-3star" onclick="startSummon([3,3,3,3,3,3,3,3,3,3])">10-Pull (All 3★)</button>
      <button class="btn-4star" onclick="startSummon([3,3,3,3,3,4,3,3,3,3])">10-Pull (Guaranteed 4★)</button>
      <button class="btn-5star" onclick="startSummon([3,3,4,3,3,5,3,3,4,3])">10-Pull (Divine 5★!)</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const skipBtn = document.getElementById('skip-btn');
    const showcaseBox = document.getElementById('showcase-box');
    const showcaseGrid = document.getElementById('showcase-grid');
    const closeShowcase = document.getElementById('close-showcase');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    let animationPhase = 'none'; // 'none' | 'meteor' | 'showcase'
    let maxRarity = 3;
    let currentResults = [];
    let frameId;

    // Simulation Pools
    let stars = [];
    let meteors = [];
    let explosionParticles = [];
    let shockwaves = [];
    let lensFlares = [];
    let cracks = []; // Screen crack segments

    let timeScale = 1.0;
    let flashFrameCount = 0;
    let shakeFrameCount = 0;
    let vortexRotation = 0;
    let vortexPulse = 0;

    // Pre-render glowing sprites in offscreen canvas caches (White, Cyan, Purple, Gold)
    const spriteCache = {};
    const spriteColors = {
      cyan: 'rgba(34, 211, 238, ',
      purple: 'rgba(192, 132, 252, ',
      gold: 'rgba(251, 191, 36, ',
      white: 'rgba(255, 255, 255, '
    };

    function initSprites() {
      Object.keys(spriteColors).forEach(colorKey => {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = 32;
        offCanvas.height = 32;
        const offCtx = offCanvas.getContext('2d');
        const grad = offCtx.createRadialGradient(16, 16, 1, 16, 16, 14);
        grad.addColorStop(0, spriteColors[colorKey] + '1.0)');
        grad.addColorStop(0.3, spriteColors[colorKey] + '0.6)');
        grad.addColorStop(0.6, spriteColors[colorKey] + '0.15)');
        grad.addColorStop(1, spriteColors[colorKey] + '0.0)');
        
        offCtx.fillStyle = grad;
        offCtx.beginPath();
        offCtx.arc(16, 16, 16, 0, Math.PI * 2);
        offCtx.fill();
        spriteCache[colorKey] = offCanvas;
      });
    }
    initSprites();

    // Initial stars setup
    function setupStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5 + 0.4,
          speed: Math.random() * 1.2 + 0.4,
          vx: -(Math.random() * 0.8 + 0.2), 
          vy: Math.random() * 0.8 + 0.2
        });
      }
    }
    setupStars();

    function getElementColors(element) {
      switch (element) {
        case 'pyro': return ['#ef4444', '#f97316', '#fbbf24'];
        case 'hydro': return ['#3b82f6', '#60a5fa', '#ffffff'];
        case 'electro': return ['#a855f7', '#c084fc', '#e9d5ff'];
        case 'cryo': return ['#22d3ee', '#38bdf8', '#ffffff'];
        case 'anemo': return ['#2dd4bf', '#a7f3d0', '#ffffff'];
        case 'geo': return ['#ca8a04', '#fbbf24', '#fef08a'];
        case 'dendro': return ['#22c55e', '#86efac', '#ffffff'];
        default: return ['#38bdf8', '#06b6d4', '#ffffff'];
      }
    }

    function startSummon(pulls) {
      const elements = ['pyro', 'hydro', 'electro', 'cryo', 'anemo', 'geo', 'dendro'];
      currentResults = pulls.map((rarity, i) => ({
        id: i,
        name: rarity === 5 ? 'Celestial Hero' : rarity === 4 ? 'Elite Armament' : 'Standard Weapon',
        rarity,
        element: rarity >= 4 ? elements[Math.floor(Math.random() * elements.length)] : undefined
      }));

      maxRarity = Math.max(...pulls);
      showcaseBox.style.opacity = '0';
      showcaseBox.style.display = 'none';

      // Reset Pools
      meteors = [];
      explosionParticles = [];
      shockwaves = [];
      lensFlares = [];
      cracks = [];
      timeScale = 1.0;
      flashFrameCount = 0;
      shakeFrameCount = 0;
      vortexRotation = 0;
      vortexPulse = 0;

      // Setup meteors. Sort highest rarity to the front so it leads.
      const sortedResults = [...currentResults].sort((a, b) => b.rarity - a.rarity);
      const targetX = width * 0.35;
      const targetY = height * 0.65;
      const angle = Math.atan2(targetY + 50, targetX - (width + 50));

      meteors = sortedResults.map((item, index) => {
        let pColor = '#06b6d4'; // 3★ Cyan
        let sColor = '#38bdf8';
        let sCacheKey = 'cyan';
        if (item.rarity === 5) {
          pColor = '#f59e0b'; // 5★ Amber
          sColor = '#fbbf24';
          sCacheKey = 'gold';
        } else if (item.rarity === 4) {
          pColor = '#a855f7'; // 4★ Purple
          sColor = '#c084fc';
          sCacheKey = 'purple';
        }

        // Offset parallel spacing spread
        const spreadOffset = sortedResults.length === 1 ? 0 : (index - (sortedResults.length - 1)/2) * 26;
        const perpX = Math.cos(angle + Math.PI/2) * spreadOffset;
        const perpY = Math.sin(angle + Math.PI/2) * spreadOffset;

        return {
          startX: width + 80 + perpX,
          startY: -80 + perpY,
          endX: targetX + perpX,
          endY: targetY + perpY,
          x: width + 80 + perpX,
          y: -80 + perpY,
          radius: item.rarity === 5 ? 12 : item.rarity === 4 ? 9 : 6,
          progress: 0,
          speed: (0.014 + Math.random() * 0.003) * 0.45, // 2.25x slower (0.45 speed multiplier)
          angle,
          delay: index * 10.2, // 2.25x staggered spacing
          rarity: item.rarity,
          element: item.element,
          primaryColor: pColor,
          secondaryColor: sColor,
          spriteKey: sCacheKey,
          isExploded: false,
          history: [] // Holds coordinate history for rendering smooth tapering ribbon tails
        };
      });

      animationPhase = 'meteor';
      skipBtn.style.display = 'block';
    }

    skipBtn.addEventListener('click', () => {
      finishAnimation();
    });

    closeShowcase.addEventListener('click', () => {
      showcaseBox.style.opacity = '0';
      setTimeout(() => {
        showcaseBox.style.display = 'none';
        animationPhase = 'none';
      }, 300);
    });

    function generateScreenCrack(x, y) {
      const crackCount = 6;
      cracks = [];
      for (let i = 0; i < crackCount; i++) {
        const segments = [];
        let currX = x;
        let currY = y;
        let angle = (i / crackCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const totalLength = 80 + Math.random() * 120;
        const step = 20;

        for (let len = 0; len < totalLength; len += step) {
          const nextX = currX + Math.cos(angle) * step + (Math.random() - 0.5) * 12;
          const nextY = currY + Math.sin(angle) * step + (Math.random() - 0.5) * 12;
          segments.push({ x1: currX, y1: currY, x2: nextX, y2: nextY });
          currX = nextX;
          currY = nextY;
          angle += (Math.random() - 0.5) * 0.2;
        }
        cracks.push({ segments, alpha: 1.0 });
      }
    }

    function finishAnimation() {
      skipBtn.style.display = 'none';
      animationPhase = 'showcase';
      
      showcaseGrid.innerHTML = '';
      currentResults.forEach((res, index) => {
        const card = document.createElement('div');
        card.className = `showcase-card card-${res.rarity}`;
        card.style.animationDelay = `${index * 0.08}s`;
        
        let emoji = '⚔️';
        if (res.rarity === 5) emoji = '👑';
        else if (res.rarity === 4) emoji = '🛡️';

        card.innerHTML = `
          <div style="font-size: 26px;">${emoji}</div>
          <div style="font-size: 8px; font-family: monospace; text-transform: uppercase; color: #94a3b8; text-align:center;">
            ${res.rarity >= 4 ? `<span style="font-size:7px; color:#38bdf8; display:block;">${res.element}</span>` : ''}
            ${res.name}
          </div>
          <div class="card-rarity">${'★'.repeat(res.rarity)}</div>
        `;
        showcaseGrid.appendChild(card);
      });

      showcaseBox.style.display = 'flex';
      setTimeout(() => {
        showcaseBox.style.opacity = '1';
      }, 50);
    }

    // MAIN ANIMATION LOOP
    function loop() {
      ctx.save();

      // Screen Shake translation
      if (shakeFrameCount > 0) {
        const shakeIntensity = (maxRarity === 5 ? 12 : maxRarity === 4 ? 7 : 3) * (shakeFrameCount / 15);
        const dx = (Math.random() - 0.5) * 2 * shakeIntensity;
        const dy = (Math.random() - 0.5) * 2 * shakeIntensity;
        ctx.translate(dx, dy);
      }

      ctx.clearRect(0, 0, width, height);

      // Cosmic background
      ctx.fillStyle = '#030409';
      ctx.fillRect(0, 0, width, height);

      // Starfield warp rendering
      stars.forEach(star => {
        const warpMultiplier = (animationPhase === 'meteor' && maxRarity === 5) ? 3.5 : 1.0;
        star.x += star.vx * star.speed * timeScale * warpMultiplier;
        star.y += star.vy * star.speed * timeScale * warpMultiplier;

        if (star.x < 0) { star.x = width; star.y = Math.random() * height; }
        if (star.y > height) { star.y = 0; star.x = Math.random() * width; }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        if (animationPhase === 'meteor' && maxRarity === 5) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.lineWidth = star.size;
          ctx.beginPath();
          ctx.moveTo(star.x, star.y);
          ctx.lineTo(star.x - star.vx * 15, star.y - star.vy * 15);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Dimensional vortex (Accretion disk)
      if (animationPhase === 'meteor') {
        vortexRotation += 0.0087 * timeScale; // 2.25x slower accretion rotation
        vortexPulse += 0.022 * timeScale; // 2.25x slower accretion pulsing

        const vX = width * 0.35;
        const vY = height * 0.65;
        const pulseFactor = 1.0 + Math.sin(vortexPulse) * 0.05;

        ctx.save();
        ctx.translate(vX, vY);
        
        // Swirling outer rings (rendered with uniform stroke arcs to support all devices)
        ctx.rotate(vortexRotation);
        ctx.strokeStyle = maxRarity === 5 ? 'rgba(245, 158, 11, 0.2)' : maxRarity === 4 ? 'rgba(168, 85, 247, 0.15)' : 'rgba(6, 182, 212, 0.12)';
        ctx.lineWidth = 4;
        
        ctx.beginPath();
        const rX1 = 100 * pulseFactor;
        const rY1 = 30 * pulseFactor;
        for (let a = 0; a <= Math.PI * 2; a += 0.1) {
          const px = Math.cos(a) * rX1;
          const py = Math.sin(a) * rY1;
          if (a === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();

        ctx.rotate(-vortexRotation * 1.5);
        ctx.beginPath();
        const rX2 = 70 * pulseFactor;
        const rY2 = 20 * pulseFactor;
        for (let a = 0; a <= Math.PI * 2; a += 0.1) {
          const px = Math.cos(a) * rX2;
          const py = Math.sin(a) * rY2;
          if (a === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();

        // Dark Event Horizon center core
        ctx.fillStyle = '#020308';
        ctx.beginPath();
        ctx.arc(0, 0, 16 * pulseFactor, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      if (animationPhase === 'meteor') {
        let activeMeteorsLeft = false;

        // Apply Time-Dilation / Bullet-time for 5-star right before impact
        if (maxRarity === 5) {
          const mainMeteor = meteors[0];
          if (mainMeteor && !mainMeteor.isExploded && mainMeteor.progress >= 0.72 && mainMeteor.progress < 0.94) {
            timeScale = Math.max(0.12, timeScale - 0.08); // Decelerate
          } else {
            timeScale = Math.min(1.0, timeScale + 0.08); // Return to normal
          }
        } else {
          timeScale = 1.0;
        }

        meteors.forEach(m => {
          if (m.delay > 0) {
            m.delay -= timeScale;
            activeMeteorsLeft = true;
            return;
          }

          if (!m.isExploded) {
            activeMeteorsLeft = true;
            m.progress += m.speed * timeScale;

            const t = m.progress;
            const easeT = 1 - Math.pow(1 - t, 3); // Cubic ease out

            // 3D perspective depth sizing
            const mRadius = m.radius * (0.3 + 0.7 * easeT);

            m.x = m.startX + (m.endX - m.startX) * easeT;
            m.y = m.startY + (m.endY - m.startY) * easeT;

            // Spiraling corkscrew wave offset calculation
            const perpAngle = m.angle + Math.PI / 2;
            const waveOffset = Math.sin(easeT * Math.PI * 2.5) * (m.rarity === 5 ? 18 : 12);
            m.x += Math.cos(perpAngle) * waveOffset;
            m.y += Math.sin(perpAngle) * waveOffset;

            // Update coordinate history for ribbon comet rendering
            m.history.push({ x: m.x, y: m.y });
            if (m.history.length > 8) m.history.shift();

            // Render glowing taper comets (smooth ribbon trails)
            if (m.history.length > 1) {
              ctx.save();
              ctx.beginPath();
              ctx.moveTo(m.history[0].x, m.history[0].y);
              for (let hIdx = 1; hIdx < m.history.length; hIdx++) {
                ctx.lineTo(m.history[hIdx].x, m.history[hIdx].y);
              }
              ctx.strokeStyle = m.primaryColor;
              ctx.lineWidth = mRadius * 1.5;
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';
              ctx.stroke();
              ctx.restore();
            }

            // Draw comet head
            ctx.save();
            ctx.beginPath();
            ctx.arc(m.x, m.y, mRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = m.secondaryColor;
            ctx.fill();
            ctx.restore();

            // Destination reached
            if (m.progress >= 1.0) {
              m.isExploded = true;
              m.x = m.endX;
              m.y = m.endY;

              shakeFrameCount = 15;
              flashFrameCount = 12;

              // Generate Screen Crack on 5-Star impact
              if (m.rarity === 5) {
                generateScreenCrack(m.endX, m.endY);
              }

              // Shockwave Rings
              const ringColors = m.rarity === 5 ? ['#fbbf24', '#fb7185', '#ffffff'] : m.rarity === 4 ? ['#c084fc', '#818cf8', '#ffffff'] : ['#22d3ee', '#38bdf8'];
              ringColors.forEach((color, idx) => {
                shockwaves.push({
                  x: m.endX,
                  y: m.endY,
                  radius: 5,
                  maxRadius: 100 + idx * 40 + (m.rarity === 5 ? 60 : 20),
                  speed: 4.5 + idx * 2,
                  color,
                  alpha: 1.0
                });
              });

              // Anamorphic Lens Flare
              lensFlares.push({
                x: m.endX,
                y: m.endY,
                width: 10,
                maxWidth: width * 0.8,
                height: m.rarity === 5 ? 8 : m.rarity === 4 ? 6 : 4,
                alpha: 1.0,
                color: m.secondaryColor
              });

              // Map colors for Element-Specific explosions
              const sparkColors = m.element ? getElementColors(m.element) : [m.secondaryColor, m.primaryColor, '#ffffff'];

              // Spawn explosion sparks
              const burstCount = m.rarity === 5 ? 85 : m.rarity === 4 ? 50 : 25;
              for (let k = 0; k < burstCount; k++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (m.rarity === 5 ? 6 : m.rarity === 4 ? 4.5 : 3.5) + 1;
                const color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                
                // Assign a sprite cache key for hardware acceleration
                let key = 'white';
                if (color.includes('#fb') || color.includes('#eab') || color.includes('#f97')) key = 'gold';
                else if (color.includes('#c0') || color.includes('#a8') || color.includes('#81')) key = 'purple';
                else if (color.includes('#22') || color.includes('#3b') || color.includes('#60')) key = 'cyan';

                explosionParticles.push({
                  x: m.endX,
                  y: m.endY,
                  vx: Math.cos(angle) * speed,
                  vy: Math.sin(angle) * speed,
                  gravity: Math.random() * 0.08 + 0.03, // curve downward
                  spriteKey: key,
                  size: Math.random() * (mRadius * 0.85) + 1.5,
                  life: 0,
                  maxLife: 35 + Math.random() * 30
                });
              }
            }
          }
        });

        // Trigger finish once all active particles/flares have finished exploding
        if (!activeMeteorsLeft && explosionParticles.length === 0 && shockwaves.length === 0 && lensFlares.length === 0 && cracks.length === 0) {
          finishAnimation();
        }
      }

      // Draw Hardware-Accelerated hardware explosion particles
      const activeGroups = { white: [], gold: [], purple: [], cyan: [] };
      
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const ep = explosionParticles[i];
        ep.x += ep.vx * timeScale;
        ep.y += ep.vy * timeScale;
        ep.vy += ep.gravity * timeScale; // gravity pull
        ep.vx *= 0.97;
        ep.vy *= 0.97;
        ep.life += timeScale;

        if (ep.life >= ep.maxLife) {
          explosionParticles.splice(i, 1);
        } else {
          const alpha = 1 - ep.life / ep.maxLife;
          activeGroups[ep.spriteKey].push({ x: ep.x, y: ep.y, size: ep.size, alpha });
        }
      }

      // Render batched particle sprites from offscreen canvas
      Object.keys(activeGroups).forEach(key => {
        const items = activeGroups[key];
        if (items.length === 0) return;
        const spriteImg = spriteCache[key];
        
        items.forEach(item => {
          ctx.save();
          ctx.globalAlpha = item.alpha;
          // Draw pre-cached sprite stretched/scaled to particle size
          ctx.drawImage(
            spriteImg,
            item.x - item.size,
            item.y - item.size,
            item.size * 2,
            item.size * 2
          );
          ctx.restore();
        });
      });

      // Update and draw shockwaves
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += sw.speed * timeScale;
        sw.alpha = 1 - sw.radius / sw.maxRadius;

        if (sw.alpha <= 0) {
          shockwaves.splice(i, 1);
        } else {
          ctx.save();
          ctx.globalAlpha = sw.alpha;
          ctx.beginPath();
          ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
          ctx.strokeStyle = sw.color;
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.restore();
        }
      }

      // Update and draw lens flares
      for (let i = lensFlares.length - 1; i >= 0; i--) {
        const lf = lensFlares[i];
        lf.width += (lf.maxWidth - lf.width) * 0.15 * timeScale;
        lf.alpha -= 0.04 * timeScale;

        if (lf.alpha <= 0) {
          lensFlares.splice(i, 1);
        } else {
          ctx.save();
          ctx.fillStyle = lf.color;
          ctx.globalAlpha = lf.alpha;
          ctx.beginPath();
          ctx.moveTo(lf.x - lf.width, lf.y);
          ctx.lineTo(lf.x, lf.y - lf.height);
          ctx.lineTo(lf.x + lf.width, lf.y);
          ctx.lineTo(lf.x, lf.y + lf.height);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      // Draw screen dimensional cracks
      for (let i = cracks.length - 1; i >= 0; i--) {
        const crack = cracks[i];
        crack.alpha -= 0.02 * timeScale;
        if (crack.alpha <= 0) {
          cracks.splice(i, 1);
        } else {
          ctx.save();
          ctx.strokeStyle = `rgba(251, 191, 36, ${crack.alpha * 0.8})`;
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#fbbf24';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          crack.segments.forEach(seg => {
            ctx.moveTo(seg.x1, seg.y1);
            ctx.lineTo(seg.x2, seg.y2);
          });
          ctx.stroke();
          ctx.restore();
        }
      }

      // Bottom HUD message
      if (animationPhase === 'meteor' && meteors.length > 0 && meteors[0].progress > 0.05) {
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
        ctx.font = 'bold 12px "Space Grotesk", sans-serif';
        ctx.textAlign = 'center';
        const label = maxRarity === 5 
          ? '★ D I V I N E   S I G N A L   A L I G N E D ★' 
          : maxRarity === 4 
            ? '★ S T E L L A R   H A R M O N Y   D E T E C T E D ★' 
            : '★ A L I G N I N G   C O S M O S ★';
        ctx.fillText(label, width / 2, height * 0.85);
        ctx.restore();
      }

      ctx.restore(); // Restore shake translation

      // Draw white screen flash
      if (flashFrameCount > 0) {
        const opacity = flashFrameCount / 12;
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fillRect(0, 0, width, height);
        flashFrameCount--;
      }

      if (shakeFrameCount > 0) shakeFrameCount--;

      frameId = requestAnimationFrame(loop);
    }

    frameId = requestAnimationFrame(loop);
  </script>
</body>
</html>
