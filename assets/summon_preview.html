<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summon Cutscene Animation Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #02040a;
      color: #fff;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Controls Panel */
    #controls {
      position: absolute;
      bottom: 40px;
      z-index: 30;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: rgba(11, 15, 27, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 24px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      max-width: 90%;
      justify-content: center;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Rarity specific buttons */
    .btn-3star { border-color: rgba(6, 182, 212, 0.4); color: #22d3ee; }
    .btn-3star:hover { background: rgba(6, 182, 212, 0.15); box-shadow: 0 0 15px rgba(6, 182, 212, 0.25); }

    .btn-4star { border-color: rgba(168, 85, 247, 0.4); color: #c084fc; }
    .btn-4star:hover { background: rgba(168, 85, 247, 0.15); box-shadow: 0 0 15px rgba(168, 85, 247, 0.25); }

    .btn-5star { border-color: rgba(245, 158, 11, 0.4); color: #fbbf24; }
    .btn-5star:hover { background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 15px rgba(245, 158, 11, 0.25); }

    /* Glassmorphic Skip button */
    #skip-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 40;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.15s ease;
      display: none;
    }

    #skip-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.03);
    }

    #skip-btn:active {
      transform: scale(0.97);
    }

    #status-msg {
      position: absolute;
      top: 40px;
      z-index: 25;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #showcase-box {
      position: absolute;
      inset: 0;
      z-index: 15;
      background: rgba(2, 3, 8, 0.96);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #showcase-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      max-width: 900px;
      justify-content: center;
      padding: 20px;
    }

    .showcase-card {
      width: 120px;
      height: 180px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: popCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.6) translateY(20px);
    }

    @keyframes popCard {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-5 { border-color: rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.08); box-shadow: 0 0 25px rgba(245, 158, 11, 0.15); }
    .card-4 { border-color: rgba(168, 85, 247, 0.4); background: rgba(168, 85, 247, 0.08); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); }

    .card-rarity {
      color: #fbbf24;
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="container">
    <div id="status-msg">Gacha Particle Space Stable</div>
    <button id="skip-btn">Skip Sequence</button>

    <!-- Transparent Drawing Layer -->
    <canvas id="canvas"></canvas>

    <!-- Showcase Container -->
    <div id="showcase-box">
      <h2 style="font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin: 0; text-align: center;">Summon stabilized</h2>
      <div id="showcase-grid"></div>
      <button id="close-showcase" style="border-color: rgba(255, 255, 255, 0.25);">Close Results</button>
    </div>

    <!-- Interface Panel -->
    <div id="controls">
      <button class="btn-3star" onclick="startSummon([3])">Single Pull (3★)</button>
      <button class="btn-4star" onclick="startSummon([4])">Single Pull (4★)</button>
      <button class="btn-5star" onclick="startSummon([5])">Single Pull (5★)</button>
      <div style="width: 1px; background: rgba(255, 255, 255, 0.1); margin: 0 4px;"></div>
      <button class="btn-3star" onclick="startSummon([3,3,3,3,3,3,3,3,3,3])">10-Pull (All 3★)</button>
      <button class="btn-4star" onclick="startSummon([3,3,3,3,3,4,3,3,3,3])">10-Pull (Guaranteed 4★)</button>
      <button class="btn-5star" onclick="startSummon([3,3,4,3,3,5,3,3,4,3])">10-Pull (Divine 5★!)</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const skipBtn = document.getElementById('skip-btn');
    const showcaseBox = document.getElementById('showcase-box');
    const showcaseGrid = document.getElementById('showcase-grid');
    const closeShowcase = document.getElementById('close-showcase');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    let animationPhase = 'none'; // 'none' | 'meteor' | 'showcase'
    let maxRarity = 3;
    let currentResults = [];
    let frameId;

    // Simulation Arrays
    let stars = [];
    let meteors = [];
    let particles = [];
    let explosionParticles = [];
    let shockwaves = [];
    let lensFlares = [];

    let timeScale = 1.0;
    let flashFrameCount = 0;
    let shakeFrameCount = 0;

    // Initial stars setup (Hyperspace field)
    function setupStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 1.5 + 0.5,
          vx: -(Math.random() * 0.8 + 0.2), // moving opposite of meteor (diagonal leftward)
          vy: Math.random() * 0.8 + 0.2
        });
      }
    }
    setupStars();

    function startSummon(pulls) {
      currentResults = pulls.map((rarity, i) => ({
        id: i,
        name: rarity === 5 ? 'Celestial Hero' : rarity === 4 ? 'Elite Armament' : 'Standard Weapon',
        rarity
      }));

      maxRarity = Math.max(...pulls);
      showcaseBox.style.opacity = '0';
      showcaseBox.style.display = 'none';

      // Reset Pools
      meteors = [];
      particles = [];
      explosionParticles = [];
      shockwaves = [];
      lensFlares = [];
      timeScale = 1.0;
      flashFrameCount = 0;
      shakeFrameCount = 0;

      // Setup Meteors Group (Sort highest rarity to the front so it leads!)
      const sortedPulls = [...pulls].sort((a, b) => b - a);

      const targetX = width * 0.35;
      const targetY = height * 0.65;
      const angle = Math.atan2(targetY + 50, targetX - (width + 50));

      meteors = sortedPulls.map((r, index) => {
        let pColor = '#06b6d4'; // 3★ Cyan
        let sColor = '#38bdf8';
        if (r === 5) {
          pColor = '#f59e0b'; // 5★ Amber
          sColor = '#fbbf24';
        } else if (r === 4) {
          pColor = '#a855f7'; // 4★ Purple
          sColor = '#c084fc';
        }

        // Parallel offset spacing
        const spreadOffset = pulls.length === 1 ? 0 : (index - (pulls.length - 1)/2) * 24;
        const perpX = Math.cos(angle + Math.PI/2) * spreadOffset;
        const perpY = Math.sin(angle + Math.PI/2) * spreadOffset;

        return {
          startX: width + 80 + perpX,
          startY: -80 + perpY,
          endX: targetX + perpX,
          endY: targetY + perpY,
          x: width + 80 + perpX,
          y: -80 + perpY,
          radius: r === 5 ? 12 : r === 4 ? 9 : 6,
          progress: 0,
          speed: 0.014 + Math.random() * 0.003,
          angle,
          delay: index * 4, // Stagger entrance
          rarity: r,
          primaryColor: pColor,
          secondaryColor: sColor,
          isExploded: false
        };
      });

      animationPhase = 'meteor';
      skipBtn.style.display = 'block';
    }

    skipBtn.addEventListener('click', () => {
      finishAnimation();
    });

    closeShowcase.addEventListener('click', () => {
      showcaseBox.style.opacity = '0';
      setTimeout(() => {
        showcaseBox.style.display = 'none';
        animationPhase = 'none';
      }, 300);
    });

    function finishAnimation() {
      skipBtn.style.display = 'none';
      animationPhase = 'showcase';
      
      // Render Card Showcase Grid
      showcaseGrid.innerHTML = '';
      currentResults.forEach((res, index) => {
        const card = document.createElement('div');
        card.className = `showcase-card card-${res.rarity}`;
        card.style.animationDelay = `${index * 0.08}s`;
        
        let emoji = '⚔️';
        if (res.rarity === 5) emoji = '👑';
        else if (res.rarity === 4) emoji = '🛡️';

        card.innerHTML = `
          <div style="font-size: 26px;">${emoji}</div>
          <div style="font-size: 8px; font-family: monospace; text-transform: uppercase; color: #94a3b8;">${res.name}</div>
          <div class="card-rarity">${'★'.repeat(res.rarity)}</div>
        `;
        showcaseGrid.appendChild(card);
      });

      showcaseBox.style.display = 'flex';
      setTimeout(() => {
        showcaseBox.style.opacity = '1';
      }, 50);
    }

    // MAIN CANVAS LOOP
    function loop() {
      ctx.save();

      // Screen Shake translation
      if (shakeFrameCount > 0) {
        const shakeIntensity = (maxRarity === 5 ? 12 : maxRarity === 4 ? 7 : 3) * (shakeFrameCount / 15);
        const dx = (Math.random() - 0.5) * 2 * shakeIntensity;
        const dy = (Math.random() - 0.5) * 2 * shakeIntensity;
        ctx.translate(dx, dy);
      }

      ctx.clearRect(0, 0, width, height);

      // Deep space nebula background style
      ctx.fillStyle = '#03050c';
      ctx.fillRect(0, 0, width, height);

      // Update and draw background stars (hyperspace drift)
      stars.forEach(star => {
        star.x += star.vx * star.speed * timeScale * (animationPhase === 'meteor' && maxRarity === 5 ? 3 : 1);
        star.y += star.vy * star.speed * timeScale * (animationPhase === 'meteor' && maxRarity === 5 ? 3 : 1);

        // wrap around
        if (star.x < 0) { star.x = width; star.y = Math.random() * height; }
        if (star.y > height) { star.y = 0; star.x = Math.random() * width; }

        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        // If 5-star pull and flying, stretch stars
        if (animationPhase === 'meteor' && maxRarity === 5) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
          ctx.lineWidth = star.size;
          ctx.beginPath();
          ctx.moveTo(star.x, star.y);
          ctx.lineTo(star.x - star.vx * 15, star.y - star.vy * 15);
          ctx.stroke();
        } else {
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      if (animationPhase === 'meteor') {
        let activeMeteorsLeft = false;

        // Apply Time-Dilation / Bullet-time for 5-star right before impact
        if (maxRarity === 5) {
          const mainMeteor = meteors[0];
          if (mainMeteor && !mainMeteor.isExploded && mainMeteor.progress >= 0.72 && mainMeteor.progress < 0.94) {
            // Decelerate time dramatically
            timeScale = Math.max(0.1, timeScale - 0.08);
          } else {
            // Return to normal
            timeScale = Math.min(1.0, timeScale + 0.08);
          }
        } else {
          timeScale = 1.0;
        }

        meteors.forEach(m => {
          if (m.delay > 0) {
            m.delay -= timeScale;
            activeMeteorsLeft = true;
            return;
          }

          if (!m.isExploded) {
            activeMeteorsLeft = true;
            m.progress += m.speed * timeScale;

            const t = m.progress;
            const easeT = 1 - Math.pow(1 - t, 3); // Cubic ease out

            m.x = m.startX + (m.endX - m.startX) * easeT;
            m.y = m.startY + (m.endY - m.startY) * easeT;

            // Spiraling corkscrew wave offset calculation
            const perpAngle = m.angle + Math.PI / 2;
            const waveOffset = Math.sin(easeT * Math.PI * 2.5) * (m.rarity === 5 ? 18 : 12);
            m.x += Math.cos(perpAngle) * waveOffset;
            m.y += Math.sin(perpAngle) * waveOffset;

            // Spawn trail particles
            const spawnCount = m.rarity === 5 ? 6 : m.rarity === 4 ? 4 : 2;
            for (let j = 0; j < spawnCount; j++) {
              particles.push({
                x: m.x + (Math.random() - 0.5) * m.radius,
                y: m.y + (Math.random() - 0.5) * m.radius,
                vx: -Math.cos(m.angle) * (1 + Math.random() * 3) + (Math.random() - 0.5) * 1.5,
                vy: -Math.sin(m.angle) * (1 + Math.random() * 3) + (Math.random() - 0.5) * 1.5,
                color: Math.random() < 0.3 ? '#ffffff' : Math.random() < 0.65 ? m.secondaryColor : m.primaryColor,
                size: Math.random() * (m.radius * 0.55) + 1,
                life: 0,
                maxLife: 20 + Math.random() * 20
              });
            }

            // Draw radial glow backing
            const radGlow = ctx.createRadialGradient(m.x, m.y, m.radius * 0.2, m.x, m.y, m.radius * 5);
            radGlow.addColorStop(0, m.primaryColor + '66');
            radGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = radGlow;
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.radius * 5, 0, Math.PI * 2);
            ctx.fill();

            // Draw meteor head
            ctx.save();
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 18;
            ctx.shadowColor = m.secondaryColor;
            ctx.fill();
            ctx.restore();

            // Check destination reached
            if (m.progress >= 1.0) {
              m.isExploded = true;
              m.x = m.endX;
              m.y = m.endY;

              shakeFrameCount = 15;
              flashFrameCount = 12;

              // Shockwave Rings
              const ringColors = m.rarity === 5 ? ['#fbbf24', '#fb7185', '#ffffff'] : m.rarity === 4 ? ['#c084fc', '#818cf8', '#ffffff'] : ['#22d3ee', '#38bdf8'];
              ringColors.forEach((color, idx) => {
                shockwaves.push({
                  x: m.endX,
                  y: m.endY,
                  radius: 5,
                  maxRadius: 100 + idx * 40 + (m.rarity === 5 ? 60 : 20),
                  speed: 4 + idx * 2,
                  color,
                  alpha: 1.0
                });
              });

              // Anamorphic Lens Flare
              lensFlares.push({
                x: m.endX,
                y: m.endY,
                width: 10,
                maxWidth: width * 0.8,
                height: m.rarity === 5 ? 8 : m.rarity === 4 ? 6 : 4,
                alpha: 1.0,
                color: m.secondaryColor
              });

              // Spawn explosion gravity sparks
              const burstCount = m.rarity === 5 ? 100 : m.rarity === 4 ? 60 : 30;
              for (let k = 0; k < burstCount; k++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (m.rarity === 5 ? 7 : m.rarity === 4 ? 5 : 3.5) + 1;
                explosionParticles.push({
                  x: m.endX,
                  y: m.endY,
                  vx: Math.cos(angle) * speed,
                  vy: Math.sin(angle) * speed,
                  gravity: Math.random() * 0.08 + 0.03, // curve downward
                  color: Math.random() < 0.25 ? '#ffffff' : Math.random() < 0.6 ? m.secondaryColor : m.primaryColor,
                  size: Math.random() * (m.radius * 0.5) + 1.2,
                  life: 0,
                  maxLife: 35 + Math.random() * 35
                });
              }
            }
          }
        });

        // Trigger finish once all active particles/flares have finished exploding
        if (!activeMeteorsLeft && explosionParticles.length === 0 && shockwaves.length === 0) {
          finishAnimation();
        }
      }

      // Update and draw trail particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * timeScale;
        p.y += p.vy * timeScale;
        p.life += timeScale;

        if (p.life >= p.maxLife) {
          particles.splice(i, 1);
        } else {
          const alpha = 1 - p.life / p.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 6;
          ctx.shadowColor = p.color;
          ctx.fill();
          ctx.restore();
        }
      }

      // Update and draw explosion particles with gravity curves
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const ep = explosionParticles[i];
        ep.x += ep.vx * timeScale;
        ep.y += ep.vy * timeScale;
        ep.vy += ep.gravity * timeScale; // Pull downward
        ep.vx *= 0.97; // air resistance
        ep.vy *= 0.97;
        ep.life += timeScale;

        if (ep.life >= ep.maxLife) {
          explosionParticles.splice(i, 1);
        } else {
          const alpha = 1 - ep.life / ep.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(ep.x, ep.y, ep.size, 0, Math.PI * 2);
          ctx.fillStyle = ep.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = ep.color;
          ctx.fill();
          ctx.restore();
        }
      }

      // Update and draw shockwaves
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const sw = shockwaves[i];
        sw.radius += sw.speed * timeScale;
        sw.alpha = 1 - sw.radius / sw.maxRadius;

        if (sw.alpha <= 0) {
          shockwaves.splice(i, 1);
        } else {
          ctx.save();
          ctx.globalAlpha = sw.alpha;
          ctx.beginPath();
          ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
          ctx.strokeStyle = sw.color;
          ctx.lineWidth = 3;
          ctx.shadowBlur = 15;
          ctx.shadowColor = sw.color;
          ctx.stroke();
          ctx.restore();
        }
      }

      // Update and draw lens flares
      for (let i = lensFlares.length - 1; i >= 0; i--) {
        const lf = lensFlares[i];
        lf.width += (lf.maxWidth - lf.width) * 0.15 * timeScale;
        lf.alpha -= 0.04 * timeScale;

        if (lf.alpha <= 0) {
          lensFlares.splice(i, 1);
        } else {
          ctx.save();
          ctx.fillStyle = lf.color;
          ctx.globalAlpha = lf.alpha;
          ctx.shadowBlur = 20;
          ctx.shadowColor = lf.color;
          
          // Draw anamorphic horizontal bar
          ctx.beginPath();
          ctx.moveTo(lf.x - lf.width, lf.y);
          ctx.lineTo(lf.x, lf.y - lf.height);
          ctx.lineTo(lf.x + lf.width, lf.y);
          ctx.lineTo(lf.x, lf.y + lf.height);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      // Draw bottom alert text HUD during meteor
      if (animationPhase === 'meteor' && meteors.length > 0 && meteors[0].progress > 0.05) {
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
        ctx.font = 'bold 12px "Space Grotesk", sans-serif';
        ctx.textAlign = 'center';
        const label = maxRarity === 5 
          ? '★ D I V I N E   S I G N A L   A L I G N E D ★' 
          : maxRarity === 4 
            ? '★ S T E L L A R   H A R M O N Y   D E T E C T E D ★' 
            : '★ A L I G N I N G   C O S M O S ★';
        ctx.fillText(label, width / 2, height * 0.85);
        ctx.restore();
      }

      ctx.restore(); // Restore shake translation

      // Draw white screen flash
      if (flashFrameCount > 0) {
        const opacity = flashFrameCount / 12;
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fillRect(0, 0, width, height);
        flashFrameCount--;
      }

      if (shakeFrameCount > 0) shakeFrameCount--;

      frameId = requestAnimationFrame(loop);
    }

    frameId = requestAnimationFrame(loop);
  </script>
</body>
</html>
