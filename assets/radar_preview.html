<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestial Radar Scanner Simulator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #04060c;
      color: #fff;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Controls Panel */
    #controls {
      position: absolute;
      bottom: 40px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(11, 15, 27, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px 30px;
      border-radius: 24px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      max-width: 90%;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #cbd5e1;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Rarity specific buttons */
    .btn-3star { border-color: rgba(6, 182, 212, 0.4); color: #22d3ee; }
    .btn-3star:hover { background: rgba(6, 182, 212, 0.15); box-shadow: 0 0 15px rgba(6, 182, 212, 0.25); }

    .btn-4star { border-color: rgba(168, 85, 247, 0.4); color: #c084fc; }
    .btn-4star:hover { background: rgba(168, 85, 247, 0.15); box-shadow: 0 0 15px rgba(168, 85, 247, 0.25); }

    .btn-5star { border-color: rgba(245, 158, 11, 0.4); color: #fbbf24; }
    .btn-5star:hover { background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 15px rgba(245, 158, 11, 0.25); }

    #readout {
      width: 100%;
      height: 36px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.65);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    #status-msg {
      position: absolute;
      top: 40px;
      z-index: 25;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

  <div id="container">
    <div id="status-msg">CELESTIAL RADAR ACQUISITION SCANNER</div>

    <!-- Canvas layer -->
    <canvas id="canvas"></canvas>

    <!-- Controls Panel -->
    <div id="controls">
      <div id="readout">Scanner Standby. Awaiting Signal Sync...</div>
      <div class="btn-row">
        <button class="btn-3star" onclick="triggerScan([3])">Scan Single (3★)</button>
        <button class="btn-4star" onclick="triggerScan([4])">Scan Single (4★)</button>
        <button class="btn-5star" onclick="triggerScan([5])">Scan Single (5★)</button>
        <div style="width: 1px; background: rgba(255, 255, 255, 0.1); margin: 0 4px;"></div>
        <button class="btn-5star" onclick="triggerScan([3,3,3,3,3,5,3,3,4,3])">Scan 10-Pull (Featured 5★)</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const readout = document.getElementById('readout');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    let radarState = 'idle'; // 'idle' | 'scanning' | 'flash'
    let sweepAngle = 0;
    let sweepSpeed = 0.015; // Idle speed
    let targetSpeed = 0.015;

    // Grid coordinates
    let radarX = width / 2;
    let radarY = height / 2 - 50; // offset slightly upward from controls
    const radarRadius = 240;

    // Radar Concentric Circles
    const rings = [60, 120, 180, 240];

    // Targets Pool
    let targets = [];
    let nextPulls = [];
    let lockTimer = 0;
    let flashOpacity = 0;
    let maxRarity = 3;

    // Twinkling stars in the background
    let stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 1.5 + 0.3,
        alpha: Math.random() * 0.7 + 0.2,
        twinkleSpeed: 0.01 + Math.random() * 0.02
      });
    }

    // Initialize random idle targets
    function initIdleTargets() {
      targets = [];
      const count = 4 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 50 + Math.random() * 170;
        const hex = Math.floor(Math.random() * 16777215).toString(16).toUpperCase().padStart(6, '0');
        targets.push({
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          angle,
          radius,
          label: `SEC-${hex.substring(0, 3)}`,
          rarity: 3,
          isLocked: false,
          alpha: Math.random() * 0.5 + 0.3,
          twinkle: Math.random(),
          lockFlash: 0
        });
      }
    }
    initIdleTargets();

    function triggerScan(pulls) {
      if (radarState === 'scanning' || radarState === 'flash') return;

      nextPulls = pulls;
      radarState = 'scanning';
      targetSpeed = 0.05; // Speed up sweep sweep line! (3x slower: 0.05 instead of 0.15)
      readout.textContent = "SYNCHRONIZING ORBITAL RESONANCE...";

      // Spawn specific targets representing our pull items on the radar grid
      targets = [];
      maxRarity = Math.max(...pulls);
      
      pulls.forEach((rarity, index) => {
        // Distribute angles evenly or randomly
        const angle = (index / pulls.length) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
        // Keep within radar rings
        const ringRadius = rings[Math.floor(Math.random() * 3) + 1] - 30 + Math.random() * 20;
        const hex = Math.floor(Math.random() * 16777215).toString(16).toUpperCase().padStart(6, '0');
        
        targets.push({
          x: Math.cos(angle) * ringRadius,
          y: Math.sin(angle) * ringRadius,
          angle,
          radius: ringRadius,
          label: `SYS-${hex.substring(0, 3)}`,
          rarity,
          isLocked: false,
          alpha: 1.0,
          twinkle: 0,
          lockFlash: 0
        });
      });

      lockTimer = 0;
    }

    function drawGrid() {
      // Draw grid coordinates backdrop
      ctx.save();
      ctx.translate(radarX, radarY);

      // Radial rings
      rings.forEach((r, idx) => {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = idx === rings.length - 1 ? 'rgba(99, 102, 241, 0.25)' : 'rgba(34, 211, 238, 0.1)';
        ctx.lineWidth = idx === rings.length - 1 ? 2 : 1;
        ctx.setLineDash(idx === 1 || idx === 3 ? [4, 4] : []);
        ctx.stroke();
      });

      // Axis lines
      ctx.setLineDash([2, 4]);
      ctx.strokeStyle = 'rgba(34, 211, 238, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-radarRadius - 10, 0);
      ctx.lineTo(radarRadius + 10, 0);
      ctx.moveTo(0, -radarRadius - 10);
      ctx.lineTo(0, radarRadius + 10);
      ctx.stroke();

      // Sweeping Radar Line + Gradient Wedge
      ctx.save();
      ctx.rotate(sweepAngle);
      
      // Sweep gradient wedge
      const sweepGrad = ctx.createRadialGradient(0, 0, 10, 0, 0, radarRadius);
      const mainColor = maxRarity === 5 ? 'rgba(245, 158, 11,' : maxRarity === 4 ? 'rgba(168, 85, 247,' : 'rgba(34, 211, 238,';
      
      sweepGrad.addColorStop(0, mainColor + ' 0.25)');
      sweepGrad.addColorStop(1, mainColor + ' 0.0)');
      
      ctx.fillStyle = sweepGrad;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      // Draw a 35-degree wedge tail
      const tailAngle = -35 * (Math.PI / 180);
      ctx.arc(0, 0, radarRadius, tailAngle, 0, false);
      ctx.closePath();
      ctx.fill();

      // Main sweep neon line
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(radarRadius, 0);
      ctx.strokeStyle = maxRarity === 5 ? '#f59e0b' : maxRarity === 4 ? '#a855f7' : '#22d3ee';
      ctx.lineWidth = 2.5;
      ctx.shadowBlur = 10;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.stroke();
      
      ctx.restore();
      ctx.restore();
    }

    function drawTargets() {
      ctx.save();
      ctx.translate(radarX, radarY);

      targets.forEach(t => {
        // Calculate dynamic twinkle factor
        t.twinkle += 0.04;
        const opacity = t.isLocked 
          ? 1.0 
          : t.alpha * (0.6 + Math.sin(t.twinkle) * 0.4);

        let color = '#22d3ee'; // 3★ Cyan
        let glow = 'rgba(34, 211, 238, 0.4)';
        if (t.rarity === 5) {
          color = '#fbbf24'; // 5★ Gold
          glow = 'rgba(251, 191, 36, 0.5)';
        } else if (t.rarity === 4) {
          color = '#c084fc'; // 4★ Purple
          glow = 'rgba(192, 132, 252, 0.5)';
        }

        // Draw targets
        ctx.save();
        ctx.globalAlpha = opacity;
        
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.rarity >= 4 ? 6 : 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowBlur = t.isLocked ? 18 : 6;
        ctx.shadowColor = color;
        ctx.fill();

        // Locked targets get a surrounding radar diamond
        if (t.isLocked) {
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(t.x, t.y - 12);
          ctx.lineTo(t.x + 12, t.y);
          ctx.lineTo(t.x, t.y + 12);
          ctx.lineTo(t.x - 12, t.y);
          ctx.closePath();
          ctx.stroke();
        }

        // Lock impact flash ring
        if (t.lockFlash > 0) {
          ctx.beginPath();
          ctx.arc(t.x, t.y, (12 - t.lockFlash) * 3 + 6, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.globalAlpha = t.lockFlash / 10;
          ctx.stroke();
          t.lockFlash--;
        }

        // Print text coordinates tag
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(t.label, t.x + 14, t.y + 3);

        ctx.restore();
      });

      ctx.restore();
    }

    function checkLocks() {
      if (radarState !== 'scanning') return;

      // Check if sweep line intercepts target angle
      // Normalize angles between 0 and 2PI
      const normalizedSweep = sweepAngle % (Math.PI * 2);

      let allLocked = true;
      targets.forEach(t => {
        const normalizedTarget = (t.angle + Math.PI * 2) % (Math.PI * 2);
        
        // If sweep line gets close to target angle
        const diff = Math.abs(normalizedSweep - normalizedTarget);
        
        if (diff < 0.16 && !t.isLocked) {
          t.isLocked = true;
          t.lockFlash = 10; // Trigger impact ring flash
          readout.textContent = `SIGNAL FIXED: ${t.label} (${t.rarity}★ LEVEL)`;
        }

        if (!t.isLocked) {
          allLocked = false;
        }
      });

      // Once all targets are locked onto
      if (allLocked) {
        radarState = 'flash';
        flashOpacity = 1.0;
        readout.textContent = "ALIGNED! ENTERING SUMMON RIFT CORES...";
      }
    }

    // MAIN LOOP
    function loop() {
      // Clear Screen
      ctx.clearRect(0, 0, width, height);

      // Starfield background
      ctx.fillStyle = '#04060c';
      ctx.fillRect(0, 0, width, height);

      stars.forEach(star => {
        star.alpha += star.twinkleSpeed;
        if (star.alpha > 0.95 || star.alpha < 0.1) star.twinkleSpeed = -star.twinkleSpeed;
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, star.alpha)})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });

      // Update sweep angle
      sweepSpeed += (targetSpeed - sweepSpeed) * 0.08;
      sweepAngle += sweepSpeed;

      // Rendering calls
      drawGrid();
      drawTargets();
      checkLocks();

      // Screen transition flash
      if (radarState === 'flash') {
        ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`;
        ctx.fillRect(0, 0, width, height);
        flashOpacity -= 0.02;

        if (flashOpacity <= 0) {
          radarState = 'idle';
          targetSpeed = 0.015;
          initIdleTargets();
          readout.textContent = "TRANSITION FINISHED. Scanner Restabilized.";
        }
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
